version: "3.8"

networks:
  backend-tier:
    internal: true

services:
  web-infrastructure:
    image: alpine:latest
    container_name: production_web_egress
    user: "70:70"
    read_only: true
    security_opt:
      - apparmor:web-infrastructure-hardened
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backend-tier
    command: /bin/sh -c "while true; do sleep 3600; done"
